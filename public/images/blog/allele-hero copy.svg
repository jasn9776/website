<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8BDF5"/>
      <stop offset="100%" stop-color="#1E47E6"/>
    </linearGradient>
    <pattern id="stripes" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
      <rect width="1" height="20" fill="#0B1730"/>
    </pattern>
  </defs>
  <rect width="1200" height="480" fill="url(#g)"/>
  <rect width="1200" height="480" fill="url(#stripes)" opacity="0.5"/>
</svg>
